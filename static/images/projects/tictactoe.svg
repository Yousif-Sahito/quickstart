<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <text x="400" y="60" fill="#fff" font-family="system-ui,sans-serif" font-size="28" font-weight="700" text-anchor="middle">Tic Tac Toe</text>
  <rect x="250" y="100" width="300" height="300" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <line x1="350" y1="100" x2="350" y2="400" stroke="#0f3460" stroke-width="2"/>
  <line x1="450" y1="100" x2="450" y2="400" stroke="#0f3460" stroke-width="2"/>
  <line x1="250" y1="200" x2="550" y2="200" stroke="#0f3460" stroke-width="2"/>
  <line x1="250" y1="300" x2="550" y2="300" stroke="#0f3460" stroke-width="2"/>
  <text x="300" y="175" fill="#e94560" font-family="system-ui,sans-serif" font-size="48" font-weight="700" text-anchor="middle">X</text>
  <text x="400" y="275" fill="#53d8fb" font-family="system-ui,sans-serif" font-size="48" font-weight="700" text-anchor="middle">O</text>
  <text x="500" y="375" fill="#e94560" font-family="system-ui,sans-serif" font-size="48" font-weight="700" text-anchor="middle">X</text>
  <rect x="340" y="420" width="120" height="36" rx="6" fill="#e94560"/>
  <text x="400" y="444" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Reset</text>
</svg>
